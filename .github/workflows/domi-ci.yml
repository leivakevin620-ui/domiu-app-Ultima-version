name: Domi CI

on:
  pull_request:
    branches: [master]
    paths:
      - 'src/app/api/domi/**'
      - 'src/app/api/admin/domi/**'
      - 'src/app/admin/domi/**'
      - 'src/components/domi/**'
      - 'src/components/providers/RootProviders.tsx'
      - 'src/contexts/CartContext.tsx'
      - 'src/lib/domi/**'
      - 'src/test/domi-**'
      - 'supabase/migrations/**'
      - 'vitest.config.mts'
      - 'package.json'
      - 'package-lock.json'
      - '.gitignore'
      - '.github/workflows/domi-ci.yml'
  push:
    branches: [master]
    paths:
      - 'src/app/api/domi/**'
      - 'src/app/api/admin/domi/**'
      - 'src/app/admin/domi/**'
      - 'src/components/domi/**'
      - 'src/components/providers/RootProviders.tsx'
      - 'src/contexts/CartContext.tsx'
      - 'src/lib/domi/**'
      - 'src/test/domi-**'
      - 'supabase/migrations/**'
      - 'vitest.config.mts'
      - 'package.json'
      - 'package-lock.json'
      - '.gitignore'
      - '.github/workflows/domi-ci.yml'

permissions:
  contents: read

concurrency:
  group: domi-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Bloquear secretos y archivos de entorno
        shell: bash
        run: |
          set -euo pipefail

          forbidden_env_files="$(git ls-files | grep -E '(^|/)\.env($|\.)' | grep -vE '(^|/)\.env\.example$' || true)"
          if [[ -n "$forbidden_env_files" ]]; then
            echo '::error::Hay archivos de entorno versionados en el repositorio.'
            printf '%s\n' "$forbidden_env_files"
            exit 1
          fi

          secret_assignments="$(git grep -InE '(SUPABASE_SERVICE_ROLE_KEY|SUPABASE_SECRET_KEY|VERCEL_OIDC_TOKEN)[[:space:]]*=[[:space:]]*[\"'"'"'][^\"'"'"']+' -- . ':!*.example' ':!docs/**' || true)"
          if [[ -n "$secret_assignments" ]]; then
            echo '::error::Se detectaron posibles secretos privados escritos directamente en archivos.'
            printf '%s\n' "$secret_assignments" | sed -E 's/=.*/=<redacted>/'
            exit 1
          fi

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Auditar dependencias de producción
        run: npm audit --omit=dev --audit-level=high

      - name: Probar seguridad y contexto
        run: npx vitest run src/lib/domi/security.test.ts --reporter=verbose

      - name: Probar planificación multirrol y acciones
        run: npx vitest run src/lib/domi/tools/planner.test.ts --reporter=verbose

      - name: Probar registro de herramientas
        run: npx vitest run src/lib/domi/tools/registry.test.ts --reporter=verbose

      - name: Probar aislamiento por tenant y perfil
        run: npx vitest run src/lib/domi/tools/role-read.test.ts --reporter=verbose

      - name: Probar confirmación e idempotencia de acciones
        run: npx vitest run src/lib/domi/actions.test.ts --reporter=verbose

      - name: Probar arquitectura modular y memoria controlable
        run: npx vitest run src/lib/domi/chat/architecture.test.ts --reporter=verbose

      - name: Probar intenciones avanzadas y presupuesto
        run: npx vitest run src/lib/domi/agent/intent-classifier.test.ts --reporter=verbose

      - name: Probar agente completo y límites sensibles
        run: npx vitest run src/lib/domi/agent/complete-agent.test.ts --reporter=verbose

      - name: Probar conversaciones persistentes
        run: npx vitest run src/lib/domi/conversations.test.ts --reporter=verbose

      - name: Probar ciclo de sesión y hooks
        run: npx vitest run src/lib/domi/hook-order.test.ts --reporter=verbose

      - name: Probar seguridad de interfaz por perfil
        run: npx vitest run src/lib/domi/client-ui.test.ts --reporter=verbose

      - name: Probar transición real de sesión
        run: npx vitest run src/test/domi-assistant-stability.test.tsx --reporter=verbose

      - name: Compilar y validar TypeScript
        run: npm run build
