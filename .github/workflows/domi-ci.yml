# Validación permanente de Domi AI Enterprise
name: Domi CI

on:
  pull_request:
    branches: [master]
    paths:
      - 'src/app/api/domi/**'
      - 'src/app/api/admin/domi/**'
      - 'src/app/api/health/**'
      - 'src/app/admin/domi/**'
      - 'src/components/domi/**'
      - 'src/components/providers/RootProviders.tsx'
      - 'src/contexts/CartContext.tsx'
      - 'src/lib/domi/**'
      - 'src/lib/auth/**'
      - 'src/lib/http/**'
      - 'src/lib/db/supabase.ts'
      - 'src/lib/env.ts'
      - 'src/proxy.ts'
      - 'src/test/domi-**'
      - 'scripts/check-repository-secrets.mjs'
      - 'supabase/migrations/**'
      - 'vitest.config.mts'
      - 'next.config.ts'
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'package-lock.json'
      - '.env.example'
      - '.gitignore'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'docs/**'
      - '.github/workflows/domi-ci.yml'
  push:
    branches: [master]
    paths:
      - 'src/app/api/domi/**'
      - 'src/app/api/admin/domi/**'
      - 'src/app/api/health/**'
      - 'src/app/admin/domi/**'
      - 'src/components/domi/**'
      - 'src/components/providers/RootProviders.tsx'
      - 'src/contexts/CartContext.tsx'
      - 'src/lib/domi/**'
      - 'src/lib/auth/**'
      - 'src/lib/http/**'
      - 'src/lib/db/supabase.ts'
      - 'src/lib/env.ts'
      - 'src/proxy.ts'
      - 'src/test/domi-**'
      - 'scripts/check-repository-secrets.mjs'
      - 'supabase/migrations/**'
      - 'vitest.config.mts'
      - 'next.config.ts'
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'package-lock.json'
      - '.env.example'
      - '.gitignore'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'docs/**'
      - '.github/workflows/domi-ci.yml'

permissions:
  contents: read

concurrency:
  group: domi-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Escanear secretos y archivos de entorno
        id: secret_scan
        continue-on-error: true
        run: node scripts/check-repository-secrets.mjs > security-scan.txt 2>&1

      - name: Publicar diagnóstico de seguridad
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domi-security-scan
          path: security-scan.txt
          retention-days: 1

      - name: Validar escaneo de secretos
        if: steps.secret_scan.outcome == 'failure'
        run: |
          cat security-scan.txt
          exit 1

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Validar lint
        run: npm run lint

      - name: Generar auditorías npm
        id: npm_audit
        continue-on-error: true
        run: |
          npm audit --omit=dev --json > npm-audit-production.json || true
          npm audit --json > npm-audit-all.json || true

      - name: Publicar auditorías npm
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domi-npm-audit
          path: |
            npm-audit-production.json
            npm-audit-all.json
          retention-days: 1

      - name: Validar vulnerabilidades altas o críticas
        run: |
          node - <<'NODE'
          const production = require('./npm-audit-production.json');
          const complete = require('./npm-audit-all.json');
          const prodCounts = production.metadata?.vulnerabilities ?? {};
          const allCounts = complete.metadata?.vulnerabilities ?? {};
          console.log('Auditoría de producción:', prodCounts);
          console.log('Auditoría completa:', allCounts);
          if ((prodCounts.high ?? 0) > 0 || (prodCounts.critical ?? 0) > 0) process.exit(1);
          if ((allCounts.high ?? 0) > 0 || (allCounts.critical ?? 0) > 0) process.exit(1);
          NODE

      - name: Probar seguridad y contexto
        run: npx vitest run src/lib/domi/security.test.ts --reporter=verbose

      - name: Probar planificación multirrol y acciones
        run: npx vitest run src/lib/domi/tools/planner.test.ts --reporter=verbose

      - name: Probar registro de herramientas
        run: npx vitest run src/lib/domi/tools/registry.test.ts --reporter=verbose

      - name: Probar aislamiento por tenant y perfil
        run: npx vitest run src/lib/domi/tools/role-read.test.ts --reporter=verbose

      - name: Probar confirmación e idempotencia de acciones
        run: npx vitest run src/lib/domi/actions.test.ts --reporter=verbose

      - name: Probar arquitectura modular y memoria controlable
        run: npx vitest run src/lib/domi/chat/architecture.test.ts --reporter=verbose

      - name: Probar intenciones avanzadas y presupuesto
        run: npx vitest run src/lib/domi/agent/intent-classifier.test.ts --reporter=verbose

      - name: Probar agente completo y límites sensibles
        run: npx vitest run src/lib/domi/agent/complete-agent.test.ts --reporter=verbose

      - name: Probar proveedor generativo y fallback
        run: npx vitest run src/lib/domi/model/grounded-generator.test.ts --reporter=verbose

      - name: Probar conversaciones persistentes
        run: npx vitest run src/lib/domi/conversations.test.ts --reporter=verbose

      - name: Probar seguridad CSRF y autenticación
        run: npx vitest run src/test/domi-request-security.test.ts --reporter=verbose

      - name: Probar headers proxy health y Docker
        run: npx vitest run src/test/domi-web-security.test.ts --reporter=verbose

      - name: Probar ciclo de sesión y hooks
        run: npx vitest run src/lib/domi/hook-order.test.ts --reporter=verbose

      - name: Probar seguridad de interfaz por perfil
        run: npx vitest run src/lib/domi/client-ui.test.ts --reporter=verbose

      - name: Probar transición real de sesión
        run: npx vitest run src/test/domi-assistant-stability.test.tsx --reporter=verbose

      - name: Compilar y validar TypeScript
        run: npm run build

      - name: Construir imagen Docker de producción
        run: docker build --tag domiu-enterprise:${{ github.sha }} .
