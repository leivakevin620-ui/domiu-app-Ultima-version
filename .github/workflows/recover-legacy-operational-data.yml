name: Recuperar datos operativos antiguos

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/recover-legacy-operational-data.yml'
      - 'scripts/recover-legacy-operational-data.mjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: recover-legacy-operational-data
  cancel-in-progress: false

jobs:
  recover:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'recovery/legacy-operational-data-20260724'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar cliente PostgreSQL aislado
        run: |
          set -Eeuo pipefail
          mkdir -p "$RUNNER_TEMP/recovery-runner"
          cp scripts/recover-legacy-operational-data.mjs "$RUNNER_TEMP/recovery-runner/recover.mjs"
          cd "$RUNNER_TEMP/recovery-runner"
          npm init -y >/dev/null
          npm install --no-save pg@8

      - name: Validar conexiones configuradas
        env:
          SOURCE_DB_URL: ${{ secrets.SOURCE_DB_URL }}
          TARGET_DB_URL: ${{ secrets.TARGET_DB_URL }}
        run: |
          set -Eeuo pipefail
          test -n "$SOURCE_DB_URL"
          test -n "$TARGET_DB_URL"

      - name: Resguardar base antigua en esquema privado
        id: recovery
        continue-on-error: true
        env:
          SOURCE_DB_URL: ${{ secrets.SOURCE_DB_URL }}
          TARGET_DB_URL: ${{ secrets.TARGET_DB_URL }}
        run: |
          set +e
          node "$RUNNER_TEMP/recovery-runner/recover.mjs" > "$RUNNER_TEMP/recovery-full.log" 2>&1
          status=$?
          tail -n 40 "$RUNNER_TEMP/recovery-full.log" \
            | sed -E 's#(postgres(ql)?://)[^ @]+@#\1***@#g' \
            > "$RUNNER_TEMP/recovery-status.txt"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publicar diagnóstico reducido
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-recovery-status
          path: ${{ runner.temp }}/recovery-status.txt
          if-no-files-found: error
          retention-days: 1

      - name: Confirmar recuperación
        if: steps.recovery.outputs.exit_code != '0'
        run: exit 1
