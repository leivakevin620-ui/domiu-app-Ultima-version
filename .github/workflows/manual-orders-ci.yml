name: Manual Orders CI

on:
  pull_request:
    branches: ['feat/domi-complete-agent-20260719', master]
    paths:
      - 'src/app/actions/manual-orders.ts'
      - 'src/app/actions/order-panel.ts'
      - 'src/app/admin/pedidos/**'
      - 'src/app/negocio/pedidos/**'
      - 'src/components/manual-orders/**'
      - 'src/lib/orders/**'
      - 'supabase/migrations/**'
      - '.github/workflows/manual-orders-ci.yml'
  push:
    branches: ['feat/manual-order-system-*']
    paths:
      - 'src/app/actions/manual-orders.ts'
      - 'src/app/actions/order-panel.ts'
      - 'src/app/admin/pedidos/**'
      - 'src/app/negocio/pedidos/**'
      - 'src/components/manual-orders/**'
      - 'src/lib/orders/**'
      - 'supabase/migrations/**'
      - '.github/workflows/manual-orders-ci.yml'

permissions:
  contents: read

concurrency:
  group: manual-orders-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Probar dominio y tarifas
        id: domain_tests
        continue-on-error: true
        run: npx vitest run src/lib/orders/__tests__/manual-order-domain.test.ts src/lib/orders/__tests__/delivery-pricing.test.ts --reporter=verbose > manual-order-tests.txt 2>&1

      - name: Ejecutar lint
        id: lint
        continue-on-error: true
        run: npm run lint > manual-order-lint.txt 2>&1

      - name: Compilar Next.js y TypeScript
        id: build
        continue-on-error: true
        run: npm run build > manual-order-build.txt 2>&1

      - name: Escanear secretos
        id: secret_scan
        continue-on-error: true
        run: node scripts/check-repository-secrets.mjs > manual-order-secret-scan.txt 2>&1

      - name: Publicar diagnósticos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-orders-diagnostics
          path: |
            manual-order-tests.txt
            manual-order-lint.txt
            manual-order-build.txt
            manual-order-secret-scan.txt
          retention-days: 2

      - name: Validar resultados
        if: always()
        run: |
          failed=0
          for result in \
            "${{ steps.domain_tests.outcome }}:pruebas" \
            "${{ steps.lint.outcome }}:lint" \
            "${{ steps.build.outcome }}:build" \
            "${{ steps.secret_scan.outcome }}:secretos"
          do
            outcome="${result%%:*}"
            label="${result##*:}"
            echo "$label: $outcome"
            if [ "$outcome" = "failure" ]; then failed=1; fi
          done
          exit "$failed"
