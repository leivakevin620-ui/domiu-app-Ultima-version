name: Dispatch Shift Role CI

on:
  push:
    branches:
      - fix/dispatch-shift-role-integrity-20260722
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dispatch-shift-role-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      SUPER_ADMIN_EMAIL: domiumagdalena@gmail.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate lint report
        id: lint
        continue-on-error: true
        run: >-
          npx eslint
          src/app/actions/admin-user-roles.ts
          src/app/actions/business-order-status.ts
          src/app/admin/usuarios/page.tsx
          src/app/api/profile/route.ts
          src/app/negocio/pedidos/page.tsx
          src/contexts/CourierContext.tsx
          src/lib/auth/supabase.ts
          --format json --output-file lint-report.json

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dispatch-shift-role-lint
          path: lint-report.json
          if-no-files-found: error
          retention-days: 2

      - name: Enforce lint result
        if: steps.lint.outcome == 'failure'
        run: exit 1

      - name: Tests
        run: npm test -- --passWithNoTests

      - name: Production build
        run: npm run build
