name: Dispatch Shift Role CI

on:
  push:
    branches:
      - fix/dispatch-shift-role-integrity-20260722
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dispatch-shift-role-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      SUPER_ADMIN_EMAIL: domiumagdalena@gmail.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test -- --passWithNoTests

      - name: Production build
        run: npm run build
