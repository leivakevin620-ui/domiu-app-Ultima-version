name: Export source for Vercel

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.vercel' \
            -czf /tmp/domiu-master-source.tar.gz .
          mv /tmp/domiu-master-source.tar.gz ./domiu-master-source.tar.gz

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: domiu-master-source
          path: domiu-master-source.tar.gz
          if-no-files-found: error
          retention-days: 1
